workflows:
  flet-android-build:
    name: Flet Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - flag_config
      vars:
        FLET_VERSION: "0.21.2" # Или оставь пустой для актуальной
    scripts:
      - name: Set up Python and Flet SDK
        script: |
          echo "Installing Flet CLI..."
          pip install "flet[cli]"
      - name: Build Android APK
        script: |
          echo "Starting Flet compilation..."
          # Собираем APK. По умолчанию Flet ищет main.py или app.py в текущей директории
          flet build apk
    artifacts:
      - build/apk/*.apk
    publishing:
      email:
        recipients:
          - weeloks13@gmail.com
        notify:
          success: true
          failure: true
