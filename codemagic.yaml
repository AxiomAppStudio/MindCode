workflows:
  flet-android-build:
    name: Flet Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - flag_config
    scripts:
      - name: Set up Python and Flet SDK
        script: |
          echo "Installing Flet CLI..."
          pip install "flet[cli]"
      - name: Build Android APK
        script: |
          echo "Starting Flet compilation..."
          flet build apk \
            --project "MindCode" \
            --icon icon.png \
            --clear-cache \
            --web-renderer canvaskit \
            --android-permissions INTERNET,POST_NOTIFICATIONS \
            --yes
    artifacts:
      - build/apk/*.apk
    publishing:
      email:
        recipients:
          - weeloks13@gmail.com
        notify:
          success: true
          failure: true
